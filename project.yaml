id: 8
name: embeddings-benchmark
program:
  id: ai-evaluation-retrieval
  narrative_fit: Compares retrieval encoders before the platform chooses a production embedding provider.
  shared_assets:
    - benchmark fixture
    - deterministic vectorizer protocol
    - portfolio-compatible result JSON
status: benchmarked
claim: Deterministic non-neural retrieval-vectorizer comparison with correct Recall@k, indexing time, and query time.
stack:
  - python
  - sparse-vectorizers
  - tf-idf
  - feature-hashing
  - jsonl
  - docker
language_profile:
  primary: python
  secondary: []
  reason: Deterministic evaluation logic is packaged as testable Python use cases with a CLI benchmark.
decision_brain:
  agent_graph:
    mode: principal-agent-orchestrated
    source: .portfolio/decision-brain/agent-graph.yaml
    handoff: sdd/agent-handoff.md
    local_first_runtime: docker
  reuse_improvement_loop:
    source: .portfolio/decision-brain/reuse-improvement-loop.yaml
    review_path: sdd/reuse-improvement-review.md
    current_status: backlog_recorded
  principles:
    coupling_rule: Benchmark orchestration depends on a vectorizer protocol, not concrete provider SDKs.
    solid: [srp, ocp, lsp, isp, dip]
    simplicity_rule: Use deterministic vectorizers before adding downloaded neural models.
    testability_rule: Benchmark logic is callable without HTTP, cloud, paid credentials, or model downloads.
  stack_profile: python
  api_style: cli-first
  messaging: none
  cloud:
    mode: none
    local_provider: kumo
    real_provider_target: none
    adapter_rule: Future neural and provider integrations stay behind the vectorizer protocol.
  database: fixture-files
  runtime: python-cli
  library_policy: Keep the deterministic baseline in the standard library; add neural encoders only behind the vectorizer protocol.
  record_path: sdd/technical-decision.md
architecture:
  style: ports-and-adapters
  reason: Recall and ranking must remain independent from encoder implementation and CLI concerns.
  dependency_rule: Benchmark orchestration imports the vectorizer protocol; the CLI depends inward.
design_system:
  tokens: .portfolio/design-system/tokens.yaml
  readme_components: [readme_header, benchmark_card, architecture_card, references_table]
  diagram_required: true
reuse:
  kit_version: local
  uses: [catalog, programs, decision-brain, reuse-improvement-loop, architecture, language-profiles, design-system, sdd, harness, templates, skills]
benchmark:
  primary_metric: best_recall_at_3
  unit: ratio
  command: python -m embeddings_benchmark benchmark --k 3 --output benchmarks/results/embeddings-baseline.json
  result_path: benchmarks/results/embeddings-baseline.json
release:
  docker: Dockerfile
  no_secret_default_path: true
  readme_has_number: true
  references_documented: true
